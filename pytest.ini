[pytest]
testpaths = mobile_pack/tests web_pack/tests
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
markers =
    api: API-level tests (ReqRes)
    ui: UI tests (SauceDemo, requires browser)
    mobile: Mobile emulation tests (Selenium iPhone)
    web: PC desktop tests (Playwright Chromium)
    smoke: smoke tests, must pass on every commit
    negative: negative / error-path tests
